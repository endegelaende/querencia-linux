# bootc-image-builder ISO configuration for Querencia Linux
# Interactive Anaconda installer with language, keyboard and network selection

[customizations.installer.kickstart]
contents = """
# Interactive graphical installer
graphical

# Language and keyboard: use defaults but let user change in the installer
lang en_US.UTF-8 --addsupport=de_DE.UTF-8
keyboard --vckeymap=de --xlayouts='de','us'

# Timezone: default to Europe/Berlin, let user change
timezone Europe/Berlin --utc

# Network: activate DHCP so Anaconda has connectivity
network --bootproto=dhcp --activate --onboot=yes

# Bootloader
bootloader --append="quiet splash"

# Do NOT preset partitioning -- let user choose
# (Anaconda will prompt for disk selection and partitioning)

# No %post needed -- everything is already configured in the bootc image:
#   - Services enabled: lightdm, NetworkManager, bluetooth, fstrim.timer, etc.
#   - LightDM dirs: created by tmpfiles.d/lightdm.conf on every boot
#   - dconf defaults: baked into the image by build scripts
#   - SELinux labels: correct from the container build
#   - graphical.target: set as default in the image
"""
