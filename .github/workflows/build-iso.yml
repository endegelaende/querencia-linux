      - name: Get version info
        id: version
        run: |
          VERSION=$(sudo podman inspect ${{ env.IMAGE_REF }} --format '{{index .Config.Labels "org.opencontainers.image.version"}}' 2>/dev/null || echo "latest")
          DATE=$(date +%Y%m%d)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "filename=querencia-linux-nvidia-${VERSION}-${DATE}.iso" >> "$GITHUB_OUTPUT"

