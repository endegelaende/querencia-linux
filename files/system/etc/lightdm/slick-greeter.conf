# =============================================================================
# Slick Greeter Configuration
# Querencia Linux
# =============================================================================

[Greeter]
# Theme & Appearance
theme-name=Adwaita
icon-theme-name=mate
cursor-theme-name=Adwaita
font-name=Noto Sans 11

# Background
background=/usr/share/backgrounds/almalinux/default.png
background-color=#1a1a2e

# Login Screen Options
draw-user-backgrounds=true
draw-grid=false
show-hostname=true
show-power=true
show-keyboard=true
show-clock=true
show-quit=true

# Clock Format
clock-format=%H:%M  •  %A, %d. %B %Y

# Accessibility
enable-hidpi=auto
