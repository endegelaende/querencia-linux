# =============================================================================
# LightDM GTK+ Greeter Configuration
# Querencia Linux
# =============================================================================

[greeter]
# Theme & Appearance (matching MATE desktop defaults)
theme-name = BlueMenta
icon-theme-name = menta
cursor-theme-name = Adwaita
cursor-theme-size = 24
font-name = Noto Sans 11

# Font rendering
xft-antialias = true
xft-dpi = 96
xft-hintstyle = hintslight
xft-rgba = rgb

# Background (querencia2.png = dark variant with logo, copied by 72-plymouth.sh)
background = /usr/share/backgrounds/querencia/querencia2.png
user-background = false

# Panel indicators: accessibility, language, session, power, clock, hostname
indicators = ~host;~spacer;~clock;~spacer;~language;~session;~a11y;~power
panel-position = top
clock-format = %H:%M  ·  %A, %e %B %Y

# Login window
position = 50% 50%
default-user-image = #avatar-default
hide-user-image = false

# Accessibility
a11y-states = -contrast;-font;-keyboard;-reader
at-spi-enabled = false

# Security
screensaver-timeout = 300
