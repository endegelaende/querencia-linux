# =============================================================================
# LightDM Configuration
# Querencia Linux
# =============================================================================

[LightDM]
# Logging
logind-check-graphical=true
# Prevent backup display servers from spawning
backup-logs=true

[Seat:*]
# MATE as the default session
user-session=mate
# Slick Greeter as primary, falls back to gtk-greeter if unavailable
greeter-session=slick-greeter
# Fallback greeter if primary fails
#greeter-session=lightdm-gtk-greeter
# Allow greeter to fail and retry
greeter-allow-guest=false
# Disable guest login (security)
allow-guest=false
# Disable autologin (require password)
autologin-user=
autologin-session=
# Allow user switching
allow-user-switching=true
# Remember the last logged-in user
greeter-hide-users=false
# Greeter setup script to ensure runtime dirs exist
greeter-setup-script=/usr/bin/sh -c "mkdir -p /var/lib/lightdm-data /var/cache/lightdm /var/log/lightdm && chown lightdm:lightdm /var/lib/lightdm-data /var/cache/lightdm 2>/dev/null; true"

[Greeter]
# Accessibility
active-monitor=0

[VNCServer]
enabled=false
