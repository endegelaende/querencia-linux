# =============================================================================
# LightDM Configuration
# Querencia Linux
# =============================================================================

[LightDM]
# Logging
logind-check-graphical=true
backup-logs=true

[Seat:*]
# MATE as the default session
user-session=mate
# GTK Greeter as default (slick-greeter crashes in VMs without real GPU)
greeter-session=lightdm-gtk-greeter
# Disable guest login (security)
allow-guest=false
# Disable autologin (require password)
autologin-user=
autologin-session=
# Allow user switching
allow-user-switching=true
# Remember the last logged-in user
greeter-hide-users=false
# Greeter setup script to ensure runtime dirs exist (bootc/ostree clears /var)
greeter-setup-script=/bin/bash -c "mkdir -p /var/lib/lightdm-data /var/cache/lightdm /var/log/lightdm; chown lightdm:lightdm /var/lib/lightdm-data /var/cache/lightdm; chown root:lightdm /var/log/lightdm; chmod 0750 /var/log/lightdm"

[Greeter]
# Accessibility
active-monitor=0

[VNCServer]
enabled=false
