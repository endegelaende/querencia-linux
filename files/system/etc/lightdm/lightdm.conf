# =============================================================================
# LightDM Configuration
# Querencia Linux
# =============================================================================

[LightDM]
# Logging
logind-check-graphical=true

[Seat:*]
# MATE as the default session
user-session=mate
# Slick Greeter as the login screen
greeter-session=slick-greeter
# Disable guest login (security)
allow-guest=false
# Allow user switching
allow-user-switching=true
# Remember the last logged-in user
greeter-hide-users=false

[Greeter]
# Accessibility
active-monitor=0

[VNCServer]
enabled=false
