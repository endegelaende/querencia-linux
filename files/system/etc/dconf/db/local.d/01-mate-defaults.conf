# =============================================================================
# MATE Desktop Default Settings
# Querencia Linux
# =============================================================================
# This file sets system-wide defaults for the MATE Desktop.
# Users can override all settings individually.
# After changes: dconf update
# =============================================================================

# ---- Window Manager (Marco) -------------------------------------------------
[org/mate/marco/general]
theme='BlueMenta'
titlebar-font='Noto Sans Bold 10'
num-workspaces=4
compositing-manager=true
center-new-windows=true

[org/mate/marco/global-keybindings]
run-command-terminal='<Control><Alt>t'
panel-main-menu='<Alt>F1'
switch-windows='<Alt>Tab'

# ---- Desktop / Caja ----------------------------------------------------------
[org/mate/desktop/background]
show-desktop-icons=true
picture-options='zoom'

[org/mate/caja/preferences]
default-folder-viewer='list-view'
show-hidden-files=false
enable-delete=true
confirm-trash=true

[org/mate/caja/list-view]
default-zoom-level='small'

# ---- Panel Layout ------------------------------------------------------------
[org/mate/panel/general]
default-layout='default'
enable-animations=true

# ---- GTK / Interface ---------------------------------------------------------
[org/mate/desktop/interface]
gtk-theme='BlueMenta'
icon-theme='menta'
font-name='Noto Sans 10'
document-font-name='Noto Sans 10'
monospace-font-name='Noto Sans Mono 10'
menus-have-icons=true
buttons-have-icons=true
toolbar-style='both-horiz'
cursor-theme='default'
gtk-decoration-layout='menu:minimize,maximize,close'

# ---- Font Rendering ----------------------------------------------------------
[org/mate/desktop/font-rendering]
antialiasing='rgba'
hinting='slight'
rgba-order='rgb'

# ---- Terminal (mate-terminal) ------------------------------------------------
[org/mate/terminal/profiles/default]
font='Noto Sans Mono 11'
use-system-font=false
use-theme-colors=false
foreground-color='#F8F8F2'
background-color='#282A36'
palette='#262626:#E356A7:#42E66C:#E4F34A:#9B6BDF:#E64747:#75D7EC:#EFA554:#7A7A7A:#FF79C6:#50FA7B:#F1FA8C:#BD93F9:#FF5555:#8BE9FD:#FFB86C'
scrollback-unlimited=true
bold-is-bright=true
audible-bell=false
visible-bell=false

# ---- Power Management --------------------------------------------------------
[org/mate/power-manager]
sleep-computer-ac=0
sleep-display-ac=900
idle-dim-ac=true
button-lid-ac='suspend'
button-power='interactive'

# ---- Screensaver -------------------------------------------------------------
[org/mate/screensaver]
lock-enabled=true
idle-activation-enabled=true
idle-delay=10
lock-delay=0
mode='blank-only'

# ---- Mouse / Touchpad --------------------------------------------------------
[org/mate/desktop/peripherals/mouse]
cursor-size=24
natural-scrolling=false

[org/mate/desktop/peripherals/touchpad]
tap-to-click=true
natural-scrolling=true
two-finger-scrolling=true

# ---- Keyboard ----------------------------------------------------------------
[org/mate/desktop/peripherals/keyboard/kbd]
layouts=['de']

# ---- Notifications -----------------------------------------------------------
[org/mate/notification-daemon]
theme='slider'
popup-location='top_right'

# ---- Default Applications ----------------------------------------------------
[org/mate/desktop/applications/terminal]
exec='mate-terminal'

[org/mate/desktop/applications/browser]
exec='firefox'
needs-term=false

# ---- Accessibility -----------------------------------------------------------
[org/mate/desktop/accessibility]
start-at=false
